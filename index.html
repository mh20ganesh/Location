<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>क्लिक करा - लोकेशन पाठवा</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #fcece3; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; border-top: 10px solid #FF671F; }
        h1 { color: #FF671F; font-size: 26px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 25px; font-weight: bold; }
        #result { margin-top: 20px; font-size: 16px; font-weight: bold; color: #333; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #FF671F; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>लोकेशन पाठवा<br>आपोआप</h1>
    <p>आपली लोकेशन सुरक्षित आहे</p>
    
    <div id="result">
        <div class="loader"></div>
        कृपया थांबा... अचूक GPS शोधत आहे...
    </div>
</div>

<script>
let watchId;
let isRedirecting = false;

window.onload = function() {
    getLocation();
};

function getLocation() {
    const options = {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
    };

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(success, error, options);
    } else {
        document.getElementById("result").innerHTML = "तुमचा ब्राउझर लोकेशनला सपोर्ट करत नाही.";
    }
}

function success(pos) {
    if (isRedirecting) return; // एकदा रिडिरेक्ट चालू झाले की थांबवा

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy; 

    // जर लोकेशनची अचूकता ५० मीटरच्या आत असेल, तरच मेसेज पाठवा
    if (accuracy <= 50) {
        isRedirecting = true;
        navigator.geolocation.clearWatch(watchId);
        
        // 🔴 हे सर्वात महत्त्वाचे: खऱ्या आणि अधिकृत Google Maps ची लिंक
        const mapLink = "https://www.google.com/maps?q=" + lat + "," + lng;
        const message = "माझे सध्याचे लोकेशन 0226 हे आहे: " + mapLink;
        
        const phoneNumber = "918788856988";
        const whatsappUrl = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);

        document.getElementById("result").innerHTML = "<span style='color:green;'>अचूक लोकेशन मिळाले! WhatsApp उघडत आहे...</span>";

        window.location.href = whatsappUrl;
    } else {
        document.getElementById("result").innerHTML = 
            "<div class='loader'></div>अचूक निळा डॉट शोधत आहे... कृपया थांबा.<br><small style='color:#888;'>सध्याची अचूकता: " + Math.round(accuracy) + " मीटर</small>";
    }
}

function error(err) {
    console.log("GPS searching...");
}
</script>

</body>
</html>
